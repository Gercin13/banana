# Netlify configuration for Nano Studio.

[build]
  publish = "public"                 # static frontend
  functions = "netlify/functions"    # serverless API

[build.environment]
  NODE_VERSION = "20"

# Route the app's /api/* calls to the matching serverless function
# (e.g. /api/generate -> /.netlify/functions/generate). status = 200 => rewrite.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# NOTE ON TIMEOUTS: synchronous Netlify Functions have a limited runtime
# (~10s on the free tier, up to 26s on paid). "Черновик" (Nano Banana 2) fits
# comfortably; "Качество" (Pro) is slower — if you hit timeouts, lower the image
# count or use a plan with the 26s limit. The API key is read from the site's
# environment variable GEMINI_API_KEY (Site settings -> Environment variables).
